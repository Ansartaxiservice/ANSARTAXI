name: ansartaxi
description: "AnsarTaxi Flutter App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Maps
  flutter_map: ^8.2.1
  latlong2: ^0.9.1

  # Location
  geolocator: ^14.0.3
  permission_handler: ^12.0.3

  # HTTP API
  http: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
